# Production Docker Compose for VPS2 Deployment
# Deploys homelab-notebook as a standalone container
# Connects to remote Supabase and Ollama on VPS8

services:
  homelab-notebook:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: homelab-notebook
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

# Deployment notes:
# 1. Copy .env.example to .env and configure for production
# 2. Build: docker compose -f docker-compose.prod.yml build
# 3. Run: docker compose -f docker-compose.prod.yml up -d
# 4. Configure Caddy to reverse proxy notebook.haugaard.dev to localhost:3000
