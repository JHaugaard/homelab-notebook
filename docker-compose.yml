# Local Development Docker Compose
# Uses the same remote services as production (Supabase, Ollama on VPS8)
# This is for running the app locally in a container, not required for pnpm dev

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    ports:
      - "3000:3000"
    volumes:
      # Mount source code for hot reloading
      - .:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NODE_ENV=development
      - WATCHPACK_POLLING=true
    env_file:
      - .env.local
    restart: unless-stopped

# Note: No database or AI services defined here
# This app connects to remote services on VPS8:
#   - Supabase: https://supabase.haugaard.dev
#   - Ollama: https://ollama.haugaard.dev
